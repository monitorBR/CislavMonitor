name: Atualizar dados públicos

on:
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run update:data
      - run: npm run build
      - name: Commit updated data
        run: |
          git config user.name "cislav-monitor-bot"
          git config user.email "cislav-monitor-bot@users.noreply.github.com"
          git add data/historico-repasses-2024-2026.json lib/historical-data.ts data/source-coverage.json
          git diff --cached --quiet || git commit -m "Atualiza dados públicos do CISLAV"
          git push
